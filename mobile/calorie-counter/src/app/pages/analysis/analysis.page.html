<section class="analysis-shell">
  <mat-card class="action-bar">
    <button
      mat-button
      class="action-btn"
      [disabled]="hasProcessing || loading"
      [matMenuTriggerFor]="menu"
    >
      <span class="action-icon-wrap">
        <mat-icon fontSet="material-icons-outlined" class="action-icon">add</mat-icon>
      </span>
      <span class="action-label">Создать<br>отчёт</span>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="create('day')">День · итог</button>
      <button mat-menu-item (click)="create('dayRemainder')">День · остаток</button>
      <button mat-menu-item (click)="create('week')">Неделя</button>
      <button mat-menu-item (click)="create('month')">Месяц</button>
      <button mat-menu-item (click)="create('quarter')">Квартал</button>
    </mat-menu>

    <button
      mat-button
      class="action-btn"
      [disabled]="hasProcessing || loading"
      (click)="createFromDate()"
    >
      <span class="action-icon-wrap">
        <mat-icon fontSet="material-icons-outlined" class="action-icon">calendar_month</mat-icon>
      </span>
      <span class="action-label">Создать от<br>даты</span>
    </button>

    <button mat-button class="action-btn" (click)="refresh()">
      <span class="action-icon-wrap">
        <mat-icon fontSet="material-icons-outlined" class="action-icon">autorenew</mat-icon>
      </span>
      <span class="action-label">Обновить</span>
    </button>
  </mat-card>
</section>

<div
  class="analysis-content"
  infiniteScroll
  [scrollWindow]="false"
  [infiniteScrollContainer]="'.container'"
  [fromRoot]="true"
  [immediateCheck]="true"
  [infiniteScrollDistance]="1"
  [infiniteScrollThrottle]="200"
  (scrolled)="onScrollDown()"
>
  <mat-card *ngIf="loading && rows.length === 0" class="loading-card">Загрузка отчётов…</mat-card>

  <mat-card class="history-card">
    <div class="history-wrap">
      <table mat-table [dataSource]="rows" class="history">

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Дата</th>
          <td mat-cell *matCellDef="let r" class="date-cell">
            {{ r.createdAtUtc | date:'yyyy-MM-dd HH:mm' }}
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Название</th>
          <td mat-cell *matCellDef="let r">
            <button type="button" class="name-link" (click)="open(r)">{{ r.name }}</button>
          </td>
        </ng-container>

        <ng-container matColumnDef="period">
          <th mat-header-cell *matHeaderCellDef>Тип</th>
          <td mat-cell *matCellDef="let r">{{ periodLabel(r.period) }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Статус</th>
          <td mat-cell *matCellDef="let r">
            <mat-chip-set>
              <mat-chip class="status-chip status-chip--processing" *ngIf="r.isProcessing">
                processing
              </mat-chip>
              <mat-chip class="status-chip status-chip--ok" *ngIf="!r.isProcessing && r.hasMarkdown">
                ok
              </mat-chip>
              <mat-chip class="status-chip" *ngIf="!r.isProcessing && !r.hasMarkdown">
                pending
              </mat-chip>
            </mat-chip-set>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="cols"></tr>
        <tr mat-row *matRowDef="let row; columns: cols;"></tr>
      </table>
    </div>

    <div *ngIf="rows.length === 0 && !loading" class="empty">Пока нет сохранённых отчётов.</div>
    <div *ngIf="loading && rows.length > 0" class="loading-inline">Обновляем список…</div>
  </mat-card>
</div>
